upstream mediahub_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ─── HTTP：全部跳转 HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name xlvexx.cn *.xlvexx.cn;

    server_tokens off;

    # acme.sh DNS 验证不依赖 HTTP，但保留此块兼容 HTTP-01 场景
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS：主站配置 ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name video.xlvexx.cn;

    server_tokens off;
    root /home/media_hub/front/dist;

    # ── SSL 证书（由 acme.sh 管理） ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/xlvexx.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xlvexx.cn/privkey.pem;

    # ── TLS 协议与加密套件 ────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # ── SSL 会话缓存（提升握手性能） ─────────────────────────────────────────
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── OCSP Stapling（加速证书验证） ────────────────────────────────────────
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/xlvexx.cn/fullchain.pem;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── 安全响应头 ────────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Gzip 压缩 ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json image/svg+xml font/woff2;

    # ── API 反向代理（SSE 长连接） ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://mediahub_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Connection        "";
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering       off;
        proxy_cache           off;
        proxy_connect_timeout 30s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }

    # ── 静态资源永久缓存 ──────────────────────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── index.html 不缓存（SPA 入口） ────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~ /\. {
        deny all;
    }
}
